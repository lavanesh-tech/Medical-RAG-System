<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chatbot</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="chat">
  <div class="header">
    <span>AI Chatbot</span>
    <button class="toggle" onclick="toggleDark()">🌙</button>
  </div>

  <div class="messages" id="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Ask something..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.classList.add("msg", type);
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typingIndicator() {
  const div = document.createElement("div");
  div.classList.add("msg", "bot", "typing");
  div.innerText = "Bot is typing...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const loader = typingIndicator();

  try {
    const res = await fetch("/get", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ msg: text })
    });

    const data = await res.text();
    loader.remove();
    addMsg(data, "bot");

  } catch (e) {
    loader.remove();
    addMsg("Server error. Try again.", "bot");
  }
}

function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
